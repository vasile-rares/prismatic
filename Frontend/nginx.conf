server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Server-Sent Events endpoints (AI streaming: design/stream, pipeline/stream).
    # These must NOT be buffered, and need long read timeouts: a single pipeline
    # phase is one OpenAI call that can run for well over a minute with no
    # intermediate bytes, which would otherwise trip nginx's 60s default and
    # cancel the upstream request mid-flight.
    location ~ ^/api/ai/.+/stream$ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection '';

        # Push each SSE event straight to the client instead of buffering it.
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # AI generation (non-streaming pipeline) routinely exceeds nginx's
        # default 60s proxy_read_timeout; raise it so the upstream isn't cut off.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Proxy user-uploaded static assets (avatars, thumbnails, canvas images) to the backend.
    # New structure: /{userId}/avatar/... and /{userId}/projects/{projectId}/...
    # The regex matches paths starting with a numeric segment (userId).
    location ~ ^/[0-9]+/(avatar|projects)/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # robots.txt — serve the real file (prevents Angular SPA fallback returning HTML)
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # index.html must never be cached — it carries the hashed asset references
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed static assets (JS, CSS, fonts, images) — Angular appends content hash to
    # filenames in production so these can be cached indefinitely (immutable).
    location ~* \.(js|css|woff2|woff|ttf|otf|svg|png|ico|webp|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve Angular SPA — all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
